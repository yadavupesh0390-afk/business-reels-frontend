<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Reels App</title>
<style>
body { margin:0; background:black; color:white; font-family:Arial; }
#auth { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
input { margin:5px; padding:10px; width:80%; border-radius:20px; border:none; }
button { padding:10px; margin:5px; border:none; border-radius:20px; background:#ff004f; color:white; cursor:pointer; }
#app { display:none; }
.categories { position:fixed; top:0; width:100%; display:flex; overflow-x:auto; gap:10px; padding:10px; background:black; }
.categories button { background:#222; color:white; padding:6px 12px; border-radius:20px; }
.active { background:#ff004f !important; }
#reels { margin-top:60px; height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; }
.video-container { height:100vh; position:relative; scroll-snap-align:start; }
video, iframe { width:100%; height:100%; object-fit:cover; }
.actions { position:absolute; right:10px; bottom:120px; }
.actions div { margin:10px; text-align:center; }
.bottom-info { position:absolute; bottom:20px; left:10px; }
.profile { display:flex; align-items:center; }
.profile img { width:40px; border-radius:50%; }
.follow { margin-left:10px; background:#ff004f; padding:5px 10px; border-radius:20px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <input id="city" placeholder="City">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
  <button onclick="logout()">Logout</button>
  <div class="categories" id="categoryBar"></div>
  <div id="reels"></div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

// AUTO LOGIN
if(localStorage.getItem("token")){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  loadReels("all");
}

// REGISTER
async function register(){
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const city = document.getElementById("city").value;

    const res = await fetch(`${API}/auth/register`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ email, password, city })
    });
    const data = await res.json();
    alert("Registered Successfully ✅");
  } catch(err){ console.log(err); alert("Register error ❌"); }
}

// LOGIN
async function login(){
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API}/auth/login`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ email, password })
    });
    const data = await res.json();

    if(data.error){ alert(data.error); return; }
    if(!data.token){ alert("Login failed ❌"); return; }

    localStorage.setItem("token", data.token);
    localStorage.setItem("city", data.city);
    alert("Login Success ✅");
    location.reload();
  } catch(err){ console.log(err); alert("Server error ❌"); }
}

// LOGOUT
function logout(){ localStorage.clear(); location.reload(); }

// CATEGORY BAR
const categories=["all","education","shop","service","tech"];
const bar=document.getElementById("categoryBar");
categories.forEach(cat=>{
  let btn=document.createElement("button");
  btn.innerText=cat;
  btn.onclick=()=>{ document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); loadReels(cat); };
  bar.appendChild(btn);
});

// LOAD REELS
async function loadReels(category){
  let city = localStorage.getItem("city") || "";
  const res = await fetch(`${API}/reels?category=${category}&city=${city}`);
  const data = await res.json();

  let container = document.getElementById("reels");
  container.innerHTML="";

  data.forEach(r=>{
    let div=document.createElement("div");
    div.className="video-container";

    let content="";
    // Check YouTube vs MP4
    if(r.videoUrl.includes("youtube.com") || r.videoUrl.includes("youtu.be")){
      let id = r.videoUrl.split("/").pop().split("?")[0];
      content = `<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
    } else { content = `<video src="${r.videoUrl}" autoplay loop muted playsinline></video>`; }

    div.innerHTML = `
      ${content}
      <div class="actions">
        <div onclick="like(this)">❤️</div>
        <div onclick="share('${r.website}')">📤</div>
      </div>
      <div class="bottom-info">
        <div class="profile">
          <img src="https://i.pravatar.cc/150">
          <b>${r.businessName}</b>
          <span class="follow" onclick="follow(this)">Follow</span>
        </div>
        <a href="${r.website}" target="_blank">Visit 🌐</a>
      </div>
    `;
    container.appendChild(div);
  });
  observeVideos();
}

// VIDEO CONTROL
function observeVideos(){
  const videos = document.querySelectorAll("video");
  const obs = new IntersectionObserver(entries=>{ entries.forEach(e=>e.isIntersecting?e.target.play():e.target.pause()); });
  videos.forEach(v=>obs.observe(v));
}

// LIKE / FOLLOW / SHARE
function like(el){ el.innerText="❤️ Liked"; }
function follow(el){ el.innerText = el.innerText==="Follow"?"Following":"Follow"; }
function share(link){ window.open(`https://wa.me/?text=${link}`); }
</script>

</body>
</html>
