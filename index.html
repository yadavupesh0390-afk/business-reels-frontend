<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

#auth{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  width:80%;
  border-radius:20px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#ff004f;
  color:white;
}

#app{display:none;}

#reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

#loader{
  text-align:center;
  padding:20px;
}

.video-container{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RIGHT SIDE ICONS */
.actions{
  position:absolute;
  right:10px;
  bottom:140px;
}

.icon-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:12px 0;
}

.icon-block i{
  font-size:24px;
  cursor:pointer;
}

/* BOTTOM INFO */
.bottom{
  position:absolute;
  bottom:80px;
  left:10px;
  right:10px;
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
  background:#25D366;
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  margin-top:8px;
}

/* WEBSITE */
.website-link{
  display:block;
  margin-top:5px;
  color:#00ffff;
  font-size:14px;
  text-decoration:none;
  word-break:break-all;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
  <div id="loader">📍 Getting Location...</div>
  <div id="reels"></div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

let userLat = null;
let userLng = null;

/* ================= AUTO LOGIN ================= */
if(localStorage.getItem("token")){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  startApp();
}

/* ================= LOGIN ================= */
async function login(){
  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  localStorage.setItem("token",data.token);
  location.reload();
}

/* ================= START ================= */
async function startApp(){
  await getLocation();
  loadReels();
}

/* ================= GET LOCATION ================= */
function getLocation(){
  return new Promise((resolve)=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        (pos)=>{
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;

          console.log("📍 LOCATION:", userLat, userLng);
          document.getElementById("loader").innerText="Loading Reels...";
          resolve();
        },
        ()=>{
          document.getElementById("loader").innerText="❌ Location denied";
          resolve();
        }
      );
    } else {
      resolve();
    }
  });
}

/* ================= LOAD REELS ================= */
async function loadReels(){

  const res = await fetch(`${API}/reels?lat=${userLat}&lng=${userLng}`);
  const data = await res.json();

  let container = document.getElementById("reels");
  container.innerHTML="";

  data.forEach(r=>{

    let div = document.createElement("div");
    div.className="video-container";
    div.ondblclick = ()=>likeDouble(div);

    div.innerHTML = `
      <video src="${r.videoUrl}" autoplay loop playsinline></video>

      <div class="actions">
        <div class="icon-block">
          <i class="fa-regular fa-heart" onclick="like(this)"></i>
        </div>

        <div class="icon-block">
          <i class="fa-solid fa-share" onclick="share('${r.website}')"></i>
        </div>
      </div>

      <div class="bottom">
        <b>${r.businessName}</b>

        <!-- WEBSITE -->
        <a href="${r.website}" target="_blank" class="website-link">
          ${r.website ? r.website : "No Website"}
        </a>

        <!-- WHATSAPP -->
        <div class="whatsapp-btn" onclick="openWhatsApp('${r.whatsapp}')">
          <i class="fa-brands fa-whatsapp"></i>
        </div>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("loader").style.display="none";
  observeVideos();
}

/* ================= AUTO PLAY ================= */
function observeVideos(){
  const videos = document.querySelectorAll("video");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.play();
      } else {
        entry.target.pause();
      }
    });
  }, { threshold: 0.8 });

  videos.forEach(v=>obs.observe(v));
}

/* ================= LIKE ================= */
function like(el){
  el.classList.toggle("fa-solid");
  el.style.color="red";
}

/* ================= DOUBLE TAP ================= */
function likeDouble(el){
  let heart = document.createElement("div");
  heart.innerHTML="❤️";
  heart.style.position="absolute";
  heart.style.top="50%";
  heart.style.left="50%";
  heart.style.transform="translate(-50%,-50%)";
  heart.style.fontSize="80px";

  el.appendChild(heart);
  setTimeout(()=>heart.remove(),1000);
}

/* ================= SHARE ================= */
function share(link){
  if(!link) return;
  window.open(`https://wa.me/?text=${link}`);
}

/* ================= WHATSAPP ================= */
function openWhatsApp(number){
  if(!number){
    alert("No WhatsApp number");
    return;
  }
  const msg = encodeURIComponent("Hi, I saw your reel 🔥");
  window.open(`https://wa.me/${number}?text=${msg}`);
}

</script>

</body>
</html>
