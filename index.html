<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

#auth{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  width:80%;
  border-radius:20px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#ff004f;
  color:white;
}

#app{display:none;}

#reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

#loader{
  text-align:center;
  padding:20px;
}

.video-container{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.actions{
  position:absolute;
  right:10px;
  bottom:140px;
}

.icon-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:12px 0;
}

.icon-block i{
  font-size:24px;
  cursor:pointer;
}

.bottom{
  position:absolute;
  bottom:80px;
  left:10px;
  right:10px;
}

.whatsapp-btn{
  background:#25D366;
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  margin-top:8px;
}

.website-link{
  display:block;
  margin-top:5px;
  color:#00ffff;
  font-size:14px;
  text-decoration:none;
  word-break:break-all;
}
</style>
</head>

<body>

<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <div id="loader">📍 Getting Location...</div>
  <div id="reels"></div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

let userLat = null;
let userLng = null;
let soundEnabled = false;

/* ================= AUTO LOGIN ================= */
if(localStorage.getItem("token")){
  auth.style.display="none";
  app.style.display="block";
  startApp();
}

/* ================= LOGIN ================= */
async function login(){
  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  localStorage.setItem("token",data.token);
  location.reload();
}

/* ================= START ================= */
async function startApp(){
  getLocation(); // 🔥 don't wait
  loadReels();   // 🔥 fast load
}

/* ================= LOCATION ================= */
function getLocation(){

  if(!navigator.geolocation) return;

  let updated = false;

  navigator.geolocation.getCurrentPosition(
    (pos)=>{

      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      console.log("📍 LOCATION:", userLat, userLng);

      // 🔥 reload reels if location comes later
      if(!updated){
        updated = true;
        showLoader("📍 Updating nearby reels...");
        loadReels();
      }

    },
    (err)=>{
      console.log("Location error:", err.message);
    },
    {
      enableHighAccuracy:true,
      timeout:600,
      maximumAge:0
    }
  );

  // ⏱ fallback loader change
  setTimeout(()=>{
    showLoader("Loading Reels...");
  },3000);
}

/* ================= LOAD REELS ================= */
async function loadReels(){

  let url = `${API}/reels`;

  if(userLat && userLng){
    url += `?lat=${userLat}&lng=${userLng}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  let container = document.getElementById("reels");
  container.innerHTML="";

  data.forEach((r)=>{

    let div = document.createElement("div");
    div.className="video-container";

    div.innerHTML = `
      <video src="${r.videoUrl}" autoplay muted loop playsinline preload="auto"></video>

      <div class="actions">
        <div class="icon-block">
          <i class="fa-regular fa-heart" onclick="like(this)"></i>
        </div>

        <div class="icon-block">
          <i class="fa-solid fa-share" onclick="share('${r.website}')"></i>
        </div>
      </div>

      <div class="bottom">
        <b>${r.businessName}</b>

        <a href="${r.website}" target="_blank" class="website-link">
          ${r.website || "No Website"}
        </a>

        <div class="whatsapp-btn" onclick="openWhatsApp('${r.whatsapp}')">
          <i class="fa-brands fa-whatsapp"></i>
        </div>
      </div>
    `;

    const video = div.querySelector("video");

    // 🔥 FIRST TAP ENABLE SOUND
    div.addEventListener("click", () => {
      if(!soundEnabled){
        soundEnabled = true;

        document.querySelectorAll("video").forEach(v=>{
          v.muted = false;
          v.volume = 1;
        });

        video.play().catch(()=>{});
      }
    });

    container.appendChild(div);
  });

  hideLoader();

  observeVideos();

  // 🔥 first video play
  setTimeout(()=>{
    const firstVideo = document.querySelector("video");
    if(firstVideo){
      firstVideo.play().catch(()=>{});
    }
  },200);
}

/* ================= OBSERVER ================= */
function observeVideos(){
  const videos = document.querySelectorAll("video");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const video = entry.target;

      if(entry.isIntersecting){

        video.muted = !soundEnabled;
        video.play().catch(()=>{});

      } else {
        video.pause();
      }
    });
  }, { threshold: 0.6 });

  videos.forEach(v=>obs.observe(v));
}

/* ================= LOADER ================= */
function showLoader(text){
  loader.style.display="block";
  loader.innerText=text;
}

function hideLoader(){
  loader.style.display="none";
}

/* ================= LIKE ================= */
function like(el){
  el.classList.toggle("fa-solid");
  el.style.color="red";
}

/* ================= SHARE ================= */
function share(link){
  if(!link) return;
  window.open(`https://wa.me/?text=${link}`);
}

/* ================= WHATSAPP ================= */
function openWhatsApp(number){
  if(!number) return;
  const msg = encodeURIComponent("Hi, I saw your reel 🔥");
  window.open(`https://wa.me/${number}?text=${msg}`);
}
</script>

</body>
</html>
