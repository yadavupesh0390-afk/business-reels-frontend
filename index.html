<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

#auth{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  width:80%;
  border-radius:20px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#ff004f;
  color:white;
}

#app{display:none;}

#reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

#loader{
  text-align:center;
  padding:20px;
}

.video-container{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔊 MUTE ICON */
.mute-icon{
  position:absolute;
  top:20px;
  right:15px;
  font-size:20px;
  background:rgba(0,0,0,0.5);
  padding:8px;
  border-radius:50%;
}

/* RIGHT SIDE ICONS */
.actions{
  position:absolute;
  right:10px;
  bottom:140px;
}

.icon-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:12px 0;
  cursor:pointer;
}

.icon-block i{
  font-size:26px;
}

.count{
  font-size:14px;
  margin-top:4px;
}

/* BOTTOM */
.bottom{
  position:absolute;
  bottom:30px;   /* 🔥 pehle 80px tha, ab niche aa jayega */
  left:12px;
  right:12px;
}

.whatsapp-btn{
  background:#25D366;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;   /* 🔥 thoda gap */
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.website-link{
  display:block;
  margin-top:6px;
  color:#00ffff;
  font-size:15px;
  text-decoration:none;
}
.business-row{
  display:flex;
  align-items:center;
  gap:6px; /* 🔥 bas itna hi gap rahega */
}

.whatsapp-small{
  width:26px;
  height:26px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  cursor:pointer;
}

.website-link{
  display:block;
  margin-top:6px;
  color:#00ffff;
  font-size:14px;
}
</style>
</head>

<body>

<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <div id="loader">Loading Reels...</div>
  <div id="reels"></div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

let userLat = null;
let userLng = null;
let soundEnabled = false;

/* AUTO LOGIN */
if(localStorage.getItem("token")){
  auth.style.display="none";
  app.style.display="block";
  startApp();
}

/* LOGIN */
async function login(){
  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error) return alert(data.error);

  localStorage.setItem("token",data.token);
  location.reload();
}

/* START */
function startApp(){
  getLocation();
  loadReels();
}

/* LOCATION */
function getLocation(){
  if(!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      showLoader("📍 Updating nearby reels...");
      loadReels();
    },
    ()=>{},
    { timeout:8000 }
  );
}

/* LOAD REELS */
async function loadReels(){

  let url = `${API}/reels`;
  if(userLat && userLng){
    url += `?lat=${userLat}&lng=${userLng}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  reels.innerHTML = "";

  data.forEach((r)=>{

    let div = document.createElement("div");
    div.className="video-container";

    div.innerHTML = `
      <video src="${r.videoUrl}" autoplay muted loop playsinline></video>
      <div class="mute-icon">🔇</div>

      <div class="actions">

        <div class="icon-block" onclick="like(this)">
          <i class="fa-regular fa-heart"></i>
          <span class="count">${r.likes || 0}</span>
        </div>

        <div class="icon-block">
          <i class="fa-regular fa-comment"></i>
          <span class="count">${r.comments || 493}</span>
        </div>

        <div class="icon-block" onclick="share('${r.website}')">
          <i class="fa-solid fa-share"></i>
          <span class="count">${r.shares || "11.6K"}</span>
        </div>

      </div>

      <div class="bottom">
  
  <div class="business-row">
    <b>${r.businessName}</b>

    <div class="whatsapp-small" onclick="openWhatsApp('${r.whatsapp}')">
      <i class="fa-brands fa-whatsapp"></i>
    </div>
  </div>

  <a href="${r.website}" target="_blank" class="website-link">
    ${r.website || "No Website"}
  </a>

</div>
      </div>
    `;

    const video = div.querySelector("video");
    const icon = div.querySelector(".mute-icon");

    div.addEventListener("click", ()=>{

      // 🔊 FIRST CLICK SOUND ON
      if(!soundEnabled){
        soundEnabled = true;

        document.querySelectorAll("video").forEach(v=>{
          v.muted = false;
        });

        document.querySelectorAll(".mute-icon").forEach(i=>{
          i.innerText = "🔊";
        });

        video.play();
        return;
      }

      // ⏯ PLAY / PAUSE
      if(video.paused){
        video.play();
      }else{
        video.pause();
      }

    });

    reels.appendChild(div);
  });

  hideLoader();
  observeVideos();

  setTimeout(()=>{
    let v = document.querySelector("video");
    if(v) v.play();
  },200);
}

/* OBSERVER */
function observeVideos(){
  const videos = document.querySelectorAll("video");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      let v = entry.target;
      let icon = v.parentElement.querySelector(".mute-icon");

      if(entry.isIntersecting){

        v.currentTime = 0;

        if(soundEnabled){
          v.muted = false;
          icon.innerText="🔊";
        }else{
          v.muted = true;
          icon.innerText="🔇";
        }

        v.play();

      }else{
        v.pause();
        v.currentTime = 0;
      }
    });
  },{threshold:0.6});

  videos.forEach(v=>obs.observe(v));
}

/* LOADER */
function showLoader(t){
  loader.style.display="block";
  loader.innerText=t;
}
function hideLoader(){
  loader.style.display="none";
}

/* LIKE */
function like(el){
  let icon = el.querySelector("i");
  let count = el.querySelector(".count");

  icon.classList.toggle("fa-solid");
  icon.classList.toggle("fa-regular");
  icon.style.color="red";

  let current = parseInt(count.innerText) || 0;
  count.innerText = current + 1;
}

/* SHARE */
function share(link){
  if(link) window.open(`https://wa.me/?text=${link}`);
}

/* WHATSAPP */
function openWhatsApp(num){
  if(!num) return;
  window.open(`https://wa.me/${num}`);
}
</script>

</body>
</html>
