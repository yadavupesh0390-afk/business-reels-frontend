<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

/* LOGIN */
#auth{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  width:80%;
  border-radius:20px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#ff004f;
  color:white;
}

/* APP */
#app{display:none;}

/* REELS */
#reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* LOADER */
#loader{
  text-align:center;
  padding:20px;
}

.video-container{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video, iframe{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RIGHT ICONS */
.actions{
  position:absolute;
  right:10px;
  bottom:120px;
}

.icon-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:12px 0;
}

.icon-block i{
  font-size:26px;
  cursor:pointer;
}

/* BOTTOM */
.bottom{
  position:absolute;
  bottom:80px;
  left:10px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  border-radius:50%;
}

/* WHATSAPP */
.whatsapp-btn{
  background:#25D366;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
}

/* WEBSITE */
.website-link{
  display:block;
  color:#00ffff;
  margin-top:5px;
  text-decoration:none;
  font-size:13px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:black;
  border-top:1px solid #333;
}

.nav i{
  font-size:22px;
}

/* REMOVE DOWNLOAD */
video::-webkit-media-controls-download-button{
  display:none !important;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <input id="city" placeholder="City">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
  <div id="loader">Loading Reels...</div>
  <div id="reels"></div>

  <div class="nav">
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-plus"></i>
    <i class="fa-solid fa-video"></i>
    <i class="fa-solid fa-user"></i>
  </div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

// AUTO LOGIN
if(localStorage.getItem("token")){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  loadReels();
}

// REGISTER
async function register(){
  await fetch(API+"/auth/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value,
      city:city.value
    })
  });
  alert("Registered ✅");
}

// LOGIN
async function login(){
  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  localStorage.setItem("token",data.token);
  localStorage.setItem("city",data.city.trim());
  location.reload();
}

// LOAD REELS
async function loadReels(){
  document.getElementById("loader").style.display="block";

  let city = localStorage.getItem("city") || "";
  const res = await fetch(`${API}/reels?city=${city}`);
  const data = await res.json();

  let container = document.getElementById("reels");
  container.innerHTML="";

  data.forEach(r=>{

    let div = document.createElement("div");
    div.className="video-container";
    div.ondblclick = ()=>likeDouble(div);

    let content = "";

    if(r.videoUrl.includes("youtube") || r.videoUrl.includes("youtu.be")){
      let id = r.videoUrl.includes("youtu.be") 
        ? r.videoUrl.split("/").pop().split("?")[0]
        : new URL(r.videoUrl).searchParams.get("v");

      content = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}"></iframe>`;
    }
    else{
      content = `<video src="${r.videoUrl}" autoplay loop muted playsinline controlsList="nodownload" disablePictureInPicture></video>`;
    }

    div.innerHTML = `
      ${content}

      <div class="actions">
        <div class="icon-block">
          <i class="fa-regular fa-heart" onclick="like(this)"></i>
        </div>

        <div class="icon-block">
          <i class="fa-regular fa-comment"></i>
        </div>

        <div class="icon-block">
          <i class="fa-solid fa-share" onclick="share('${r.website}')"></i>
        </div>
      </div>

      <div class="bottom">
        <div class="user">
          <img src="https://i.pravatar.cc/150">
          <b>${r.businessName}</b>

          <span class="whatsapp-btn" onclick="openWhatsApp('${r.whatsapp}')">
            <i class="fa-brands fa-whatsapp"></i>
          </span>
        </div>

        <a href="${r.website}" target="_blank" class="website-link">
          ${r.website}
        </a>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("loader").style.display="none";
  observeVideos();
}

// AUTO PLAY
function observeVideos(){
  const containers = document.querySelectorAll(".video-container");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const video = entry.target.querySelector("video");

      if(video){
        if(entry.isIntersecting){
          video.play();
        } else {
          video.pause();
        }
      }
    });
  }, { threshold: 0.8 });

  containers.forEach(c=>obs.observe(c));
}

// LIKE CLICK
function like(el){
  el.classList.toggle("fa-solid");
  el.style.color="red";
}

// DOUBLE TAP ❤️
function likeDouble(el){
  let heart = document.createElement("i");
  heart.className = "fa-solid fa-heart";
  heart.style.position = "absolute";
  heart.style.top = "50%";
  heart.style.left = "50%";
  heart.style.transform = "translate(-50%, -50%)";
  heart.style.fontSize = "80px";
  heart.style.color = "red";

  el.appendChild(heart);
  setTimeout(()=>heart.remove(),1000);
}

// SHARE
function share(link){
  if(navigator.share){
    navigator.share({title:"Check this", url:link});
  }else{
    window.open(`https://wa.me/?text=${link}`);
  }
}

// WHATSAPP
function openWhatsApp(number){
  if(!number){
    alert("No WhatsApp number");
    return;
  }
  const msg = encodeURIComponent("Hi, I saw your reel 🔥");
  window.open(`https://wa.me/${number}?text=${msg}`);
}
</script>

</body>
</html>
