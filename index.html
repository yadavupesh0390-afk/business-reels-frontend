<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

/* LOGIN */
#auth{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input{
  margin:5px;
  padding:10px;
  width:80%;
  border-radius:20px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  background:#ff004f;
  color:white;
}

/* APP */
#app{display:none;}

/* REELS */
#reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.video-container{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video, iframe{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* RIGHT ICONS */
.actions{
  position:absolute;
  right:10px;
  bottom:120px;
}

.icon-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:12px 0;
}

.icon-block i{
  font-size:26px;
  cursor:pointer;
}

/* BOTTOM */
.bottom{
  position:absolute;
  bottom:80px;
  left:10px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  border-radius:50%;
}

.follow{
  border:1px solid white;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:black;
  border-top:1px solid #333;
}

.nav i{
  font-size:22px;
}

/* REMOVE DOWNLOAD */
video::-webkit-media-controls-download-button{
  display:none !important;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <input id="city" placeholder="City">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">
  <div id="reels"></div>

  <div class="nav">
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-plus"></i>
    <i class="fa-solid fa-video"></i>
    <i class="fa-solid fa-user"></i>
  </div>
</div>

<script>
const API = "https://business-reels-backend.onrender.com";

// AUTO LOGIN
if(localStorage.getItem("token")){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  loadReels();
}

// REGISTER
async function register(){
  await fetch(API+"/auth/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value,
      city:city.value
    })
  });
  alert("Registered ✅");
}

// LOGIN
async function login(){
  const res = await fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  localStorage.setItem("token",data.token);
  localStorage.setItem("city",data.city.trim());

  location.reload();
}

// LOAD REELS
async function loadReels(){
  let city = localStorage.getItem("city") || "";

  const res = await fetch(`${API}/reels?city=${city}`);
  const data = await res.json();

  let container = document.getElementById("reels");
  container.innerHTML="";

  data.forEach(r=>{

    let div = document.createElement("div");
    div.className="video-container";

    let content = "";

    // YOUTUBE
    if(r.videoUrl.includes("youtube") || r.videoUrl.includes("youtu.be")){
      let id = r.videoUrl.includes("youtu.be") 
        ? r.videoUrl.split("/").pop().split("?")[0]
        : new URL(r.videoUrl).searchParams.get("v");

      content = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}" allowfullscreen></iframe>`;
    }

    // GOOGLE DRIVE
    else if(r.videoUrl.includes("drive.google.com")){
      let id = r.videoUrl.split("/d/")[1]?.split("/")[0];
      content = `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
    }

    // VIDEO
    else{
      content = `<video src="${r.videoUrl}" autoplay loop muted playsinline></video>`;
    }

    div.innerHTML = `
      ${content}

      <div class="actions">
        <div class="icon-block">
          <i class="fa-regular fa-heart" onclick="like(this)"></i>
        </div>

        <div class="icon-block">
          <i class="fa-regular fa-comment"></i>
        </div>

        <div class="icon-block">
          <i class="fa-solid fa-share" onclick="share('${r.website}')"></i>
        </div>
      </div>

      <div class="bottom">
        <div class="user">
          <img src="https://i.pravatar.cc/150">
          <b>${r.businessName}</b>
          <span class="follow" onclick="follow(this)">Follow</span>
        </div>
        <small>${r.website || ""}</small>
      </div>
    `;

    container.appendChild(div);
  });

  observeVideos();
}

// AUTO PLAY
function observeVideos(){
  const videos=document.querySelectorAll("video");

  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      e.isIntersecting ? e.target.play() : e.target.pause();
    });
  });

  videos.forEach(v=>obs.observe(v));
}

// LIKE
function like(el){
  el.classList.toggle("fa-solid");
  el.style.color="red";
}

// FOLLOW
function follow(el){
  el.innerText = el.innerText=="Follow" ? "Following" : "Follow";
}

// SHARE
function share(link){
  window.open(`https://wa.me/?text=${link}`);
}
</script>

</body>
</html>
